<div class="learn-container">
    <div class="tab-buttons" role="tablist" aria-label="Morse code reference">
        <button class="tab-btn active" data-tab="letters" role="tab" aria-selected="true" aria-controls="letters-tab">Letters</button>
        <button class="tab-btn" data-tab="digits" role="tab" aria-selected="false" aria-controls="digits-tab">Digits</button>
        <button class="tab-btn" data-tab="punctuation" role="tab" aria-selected="false" aria-controls="punctuation-tab">Punctuation</button>
    </div>
    
    <div class="tab-content">
        <div id="letters-tab" class="tab-panel active" role="tabpanel" aria-labelledby="letters-tab">
            <div class="morse-grid" id="letters-grid"></div>
        </div>

        <div id="digits-tab" class="tab-panel" role="tabpanel" aria-labelledby="digits-tab">
            <div class="morse-grid" id="digits-grid"></div>
        </div>

        <div id="punctuation-tab" class="tab-panel" role="tabpanel" aria-labelledby="punctuation-tab">
            <div class="morse-grid" id="punctuation-grid"></div>
        </div>
    </div>
</div>
